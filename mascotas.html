    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>tokyo manji</title>

    <style>
        body {
            background-color:gray; /* fondo negro */
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .titulo {
            border: 3px solid silver;
            padding: 20px;
            width: 300px;
            margin: 20px auto;
            background-color: #1a1a1a;
            color: beige;
        }

        .galeria {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .item {
            width: 200px;
            background-color: #1a1a1a;
            padding: 10px;
            border-radius: 10px;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        p {
            color: #cccccc;
        }
    </style>
</head>
<body>

    <div class="titulo">
        <h1>Tokyo Revengers</h1>
    </div>

    <div class="galeria">

        <div class="item">
            <img src="https://i.pinimg.com/736x/63/cd/eb/63cdeb1f9952c9dc29262230f0e230fd.jpg">
            <p>Takemichi, el protagonista que viaja en el tiempo.</p>
        </div>

        <div class="item">
            <img src="https://i.pinimg.com/736x/32/8b/e4/328be484527eb502a2caace322136533.jpg">
            <p>Mikey, el líder fuerte y respetado.</p>
        </div>

        <div class="item">
            <img src="https://i.pinimg.com/736x/57/45/50/57455053e91dc50ec79a0a0225493bf4.jpg">
            <p>Draken, el corazón de la pandilla.</p>
        </div>

        <div class="item">
            <img src="https://i.pinimg.com/736x/7b/55/b2/7b55b2c413c3ead1bb7dc591623792a5.jpg">
            <p>La Tokyo Manji Gang en acción.</p>
        </div>

    </div>

</body>
