<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Página con Flexbox</title>
    <link rel="stylesheet" href="trabajo.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

       
        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

      
        .contenedor {
            display: flex;
        }

        
        aside {
            width: 20%;
            background: #f4f4f4;
            padding: 15px;
        }

       
        main {
            width: 80%;
            padding: 15px;
        }

        .slider {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            margin-bottom: 20px;
        }

        .slider img {
            width: 300px;
            height: 150px;
            object-fit: cover;
        }

       
        .tarjetas {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .tarjeta {
            background: #ddd;
            width: 30%;
            padding: 10px;
            border-radius: 10px;
        }

        .tarjeta img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

  
    <header>
        <h1>Mi Página Web</h1>
    </header>

    <!-- CONTENEDOR FLEX -->
    <div class="contenedor">

        <!-- ASIDE -->
        <aside>
            <h3>Menú</h3>
            <ul>
                <li>Inicio</li>
                <li>Galería</li>
                <li>Contacto</li>
            </ul>
        </aside>

       
        <main>

            <!-- SLIDER -->
            <section class="slider">
                <img src="https://picsum.photos/300/150?1">
                <img src="https://picsum.photos/300/150?2">
                <img src="https://picsum.photos/300/150?3">
            </section>

            <!-- TARJETAS -->
            <section class="tarjetas">

                <article class="tarjeta">
                    <figure>
                        <img src="https://picsum.photos/200/150?4">
                    </figure>
                    <h3>Título 1</h3>
                    <p>Descripción de la tarjeta.</p>
                </article>

                <article class="tarjeta">
                    <figure>
                        <img src="https://picsum.photos/200/150?5">
                    </figure>
                    <h3>Título 2</h3>
                    <p>Descripción de la tarjeta.</p>
                </article>

                <article class="tarjeta">
                    <figure>
                        <img src="https://picsum.photos/200/150?6">
                    </figure>
                    <h3>Título 3</h3>
                    <p>Descripción de la tarjeta.</p>
                </article>

            </section>

        </main>

    </div>

</body>
</html>
